name: Bug Report
description: File a bug report
labels: ["bug"]
body:
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Arch Linux, Ubuntu 24.04, Gentoo, etc
    validations:
      required: true
  - type: input
    id: comp
    attributes:
      label: Wayland Compositor
      placeholder: Niri, Hyprland, Sway, etc
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Describe the issue.
      description: You should also attach a log file. If integrated with your compositor, the logs will be at `$XDG_STATE_HOME/xwayland-satellite`.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: checkboxes
    attributes:
      label: Please confirm you have reproduced this on the latest commit.
      description: See the README for details about correctly running your build.
      options:
        - label: I have reproduced this on the latest commit
          required: true
